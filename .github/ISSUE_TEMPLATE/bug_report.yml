name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. The `termdeck doctor` output below resolves most environment issues on its own.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what happened, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a terminal with …
        2. Restart the server
        3. …
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: termdeck doctor
      description: Output of `termdeck doctor`.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version and OS
      placeholder: "termdeck 0.1.0, macOS 15.2 / Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant lines from `termdeck service logs`, or the server output.
      render: text
