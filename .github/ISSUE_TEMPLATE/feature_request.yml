name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that TermDeck makes hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you'd like
      description: The behaviour you have in mind. Rough is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've tried
