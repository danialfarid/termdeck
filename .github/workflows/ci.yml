name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install ruff
      - run: ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dtach and ripgrep (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y dtach ripgrep

      - name: Install dtach and ripgrep (macOS)
        if: runner.os == 'macOS'
        run: brew install dtach ripgrep

      - name: Install termdeck
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Version and help
        run: |
          termdeck --version
          termdeck --help

      - name: Doctor reports all required programs present
        run: termdeck doctor

      - name: Server boots and serves the UI
        env:
          TERMDECK_PORT: "8539"
          TERMDECK_DATA_DIR: ${{ runner.temp }}/termdeck-data
        run: |
          termdeck &
          for i in $(seq 1 40); do
            curl -sf -o /dev/null "http://127.0.0.1:8539/" && break
            sleep 0.5
          done
          curl -sf -o /dev/null -w 'index %{http_code}\n'    "http://127.0.0.1:8539/"
          curl -sf -o /dev/null -w 'sessions %{http_code}\n' "http://127.0.0.1:8539/api/sessions"
          curl -sf -o /dev/null -w 'settings %{http_code}\n' "http://127.0.0.1:8539/api/settings"
          kill %1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
