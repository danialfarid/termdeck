name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: python -m pip install --upgrade pip build twine && python -m build && python -m twine check dist/*

      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version=$(python -c "import re,pathlib;print(re.search(r'\"(.+?)\"',pathlib.Path('termdeck/__init__.py').read_text()).group(1))")
          if [ "$tag_version" != "$package_version" ]; then
            echo "tag $GITHUB_REF_NAME does not match termdeck/__init__.py version $package_version"
            exit 1
          fi

      - name: Create or update the GitHub release with the build artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
              --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md).

          \`\`\`sh
          brew install danialfarid/tap/termdeck
          # or, anywhere:
          uv tool install \"git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_REF_NAME}\"
          \`\`\`"
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
